<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | CodeOrbit Tech Project</title>
    <!-- Bootstrap CSS for instant styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #6610f2, #6f42c1); color: white; padding: 60px 0; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-custom { background-color: #6f42c1; color: white; border-radius: 8px; }
        .btn-custom:hover { background-color: #563d7c; color: white; }
    </style>
</head>
<body>

    <!-- Hero Header -->
    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">CodeOrbit Tech Internship</h1>
            <p class="lead">Task 1: Full-Stack Landing Page with Contact Form</p>
        </div>
    </div>

    <!-- Main Content & Form -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3 class="text-center mb-4 text-secondary">Get in Touch</h3>
                    
                    <!-- Alert Message Areas -->
                    <div id="successAlert" class="alert alert-success d-none" role="alert">
                        Message sent successfully! Your data has been stored.
                    </div>
                    <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                        Please fill out all fields correctly.
                    </div>

                    <!-- Contact Form -->
                    <form id="contactForm" novalidate>
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" required placeholder="Enter your name">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Your Message</label>
                            <textarea class="form-control" id="message" rows="4" required placeholder="Type your message here..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 py-2 fw-bold">Submit Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Frontend Form Handling Script -->
    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();
            
            const successAlert = document.getElementById('successAlert');
            const errorAlert = document.getElementById('errorAlert');

            // Basic Validation
            if (!name || !email || !message) {
                errorAlert.classList.remove('d-none');
                successAlert.classList.add('d-none');
                return;
            }

            try {
                // Sending data to backend API
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, message })
                });

                if (response.ok) {
                    successAlert.classList.remove('d-none');
                    errorAlert.classList.add('d-none');
                    document.getElementById('contactForm').reset();
                } else {
                    throw new Error('Server error');
                }
            } catch (err) {
                errorAlert.textContent = "Could not connect to the backend server.";
                errorAlert.classList.remove('d-none');
                successAlert.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
